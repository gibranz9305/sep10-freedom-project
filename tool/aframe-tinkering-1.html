<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Ground -->
      <a-plane color="#8B6F47" rotation="-90 0 0" width="10" height="5" position="0 -1.7 0"></a-plane>
      <a-sky color="#D6EAF8"></a-sky>

      <!-- Head (boxy metallic) -->
      <a-box position="0 1 0" width="0.9" height="0.8" depth="0.8" color="#A8B8C8"></a-box>

      <!-- Face panel -->
      <a-box position="0 1 0.41" width="0.7" height="0.5" depth="0.02" color="#7A9AAF"></a-box>

      <!-- Eyes (glowing) -->
      <a-sphere position="0.18 1.08 0.42" radius="0.09" color="#00FFCC"></a-sphere>
      <a-sphere position="-0.18 1.08 0.42" radius="0.09" color="#00FFCC"></a-sphere>

      <!-- Eye glow inner -->
      <a-sphere position="0.18 1.08 0.44" radius="0.04" color="#FFFFFF"></a-sphere>
      <a-sphere position="-0.18 1.08 0.44" radius="0.04" color="#FFFFFF"></a-sphere>

      <!-- Mouth grille -->
      <a-box position="-0.12 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0.12 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>

      <!-- Antenna -->
      <a-cylinder position="0 1.55 0" radius="0.03" height="0.25" color="#A8B8C8"></a-cylinder>
      <a-sphere position="0 1.69 0" radius="0.06" color="#FF4455"></a-sphere>

      <!-- Chef hat -->
      <a-cylinder position="0 1.78 0" radius="0.38" height="0.08" color="#F0F0F0"></a-cylinder>
      <a-cylinder position="0 2.13 0" radius="0.28" height="0.62" color="#FAFAFA"></a-cylinder>
      <a-sphere position="0 2.45 0" radius="0.285" color="#FAFAFA"
        phi-start="0" phi-length="180" theta-start="0" theta-length="90"></a-sphere>

      <!-- Neck -->
      <a-cylinder position="0 0.55 0" radius="0.12" height="0.2" color="#8A9BAA"></a-cylinder>

      <!-- Body (chunky torso) -->
      <a-box position="0 0 0" width="1.1" height="1.2" depth="0.6" color="#8A9BAA"></a-box>

      <!-- === OVEN PANEL === -->
      <!-- Oven outer frame (recessed into chest) -->
      <a-box position="0 0.05 0.31" width="0.72" height="0.72" depth="0.03" color="#3D4F5C"></a-box>

      <!-- Oven window (dark glass) -->
      <a-box position="0 0.1 0.33" width="0.54" height="0.46" depth="0.02" color="#1A1A2E"></a-box>

      <!-- Oven window inner glow (orange-ish, like heat inside) -->
      <a-box position="0 0.1 0.34" width="0.46" height="0.38" depth="0.01" color="#FF6B1A"></a-box>

      <!-- Heating element lines (horizontal bars inside window) -->
      <a-box position="0 0.22 0.345" width="0.38" height="0.025" depth="0.005" color="#FF2200"></a-box>
      <a-box position="0 0.1 0.345" width="0.38" height="0.025" depth="0.005" color="#FF2200"></a-box>
      <a-box position="0 -0.02 0.345" width="0.38" height="0.025" depth="0.005" color="#FF2200"></a-box>

      <!-- Oven shelf line -->
      <a-box position="0 0.02 0.345" width="0.42" height="0.012" depth="0.005" color="#8A6A40"></a-box>

      <!-- Oven door handle -->
      <a-box position="0 -0.17 0.35" width="0.44" height="></a-box>
    </a-scene>
  </body>
</html>
