<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
     <a-plane color="#964B00" rotation="-90 0 0" width="10" height="10" ></a-plane>
     <a-sky color="#FFFFFF"></a-sky>
     <a-sphere position="0 1 0" radius="0.5" color="#FF5733"></a-sphere>
     <a-cylinder color="white" radius="0.35" height="0.05" position="0 1.5 0"></a-cylinder>
     <a-cylinder color="white" radius="0.22" height="0.5" position="0 0.3 0"></a-cylinder>
        <a-sphere position="0.2 1.2 0.4" radius="0.1" color="white"></a-sphere>
        <a-sphere position="-0.2 1.2 0.4" radius="0.1" color="white"></a-sphere>

        <a-box position="0 0 0" width="1" height="1.5" depth="0.5" color="#3357FF"></a-box>

        <a-cylinder position="0.7 0 0" radius="0.1" height="1" color="#FFC300"></a-cylinder>
        <a-cylinder position="-0.7 0 0" radius="0.1" height="1" color="#FFC300"></a-cylinder>

        <a-cylinder position="0.25 -1.2 0" radius="0.15" height="1" color="#333"></a-cylinder>
        <a-cylinder position="-0.25 -1.2 0" radius="0.15" height="1" color="#333"></a-cylinder>
    </a-scene>
    </body>
</html>
