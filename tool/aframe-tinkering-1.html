     <!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Ground -->
      <a-plane color="#8B6F47" rotation="-90 0 0" width="10" height="5" position="0 -1.7 0"></a-plane>
      <a-sky color="#D6EAF8"></a-sky>

      <!-- Head (boxy metallic) -->
      <a-box position="0 1 0" width="0.9" height="0.8" depth="0.8" color="#A8B8C8"></a-box>

      <!-- Face panel -->
      <a-box position="0 1 0.41" width="0.7" height="0.5" depth="0.02" color="#7A9AAF"></a-box>

      <!-- Eyes (glowing) -->
      <a-sphere position="0.18 1.08 0.42" radius="0.09" color="#00FFCC"></a-sphere>
      <a-sphere position="-0.18 1.08 0.42" radius="0.09" color="#00FFCC"></a-sphere>

      <!-- Eye glow inner -->
      <a-sphere position="0.18 1.08 0.44" radius="0.04" color="#FFFFFF"></a-sphere>
      <a-sphere position="-0.18 1.08 0.44" radius="0.04" color="#FFFFFF"></a-sphere>

      <!-- Mouth grille (3 small boxes) -->
      <a-box position="-0.12 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0.12 0.85 0.42" width="0.08" height="0.04" depth="0.01" color="#2C3E50"></a-box>

      <!-- Antenna -->
      <a-cylinder position="0 1.55 0" radius="0.03" height="0.25" color="#A8B8C8"></a-cylinder>
      <a-sphere position="0 1.69 0" radius="0.06" color="#FF4455"></a-sphere>

      <!-- Chef hat (on top of antenna base) -->
      <a-cylinder position="0 1.78 0" radius="0.38" height="0.08" color="#F0F0F0"></a-cylinder>
      <a-cylinder position="0 2.13 0" radius="0.28" height="0.62" color="#FAFAFA"></a-cylinder>
      <a-sphere position="0 2.45 0" radius="0.285" color="#FAFAFA"
        phi-start="0" phi-length="180" theta-start="0" theta-length="90"></a-sphere>

      <!-- Neck -->
      <a-cylinder position="0 0.55 0" radius="0.12" height="0.2" color="#8A9BAA"></a-cylinder>

      <!-- Body (chunky torso) -->
      <a-box position="0 0 0" width="1.1" height="1.2" depth="0.6" color="#8A9BAA"></a-box>

      <!-- Chest panel -->
      <a-box position="0 0.1 0.31" width="0.6" height="0.5" depth="0.02" color="#6B8799"></a-box>

      <!-- Chest panel buttons -->
      <a-sphere position="-0.15 0.2 0.33" radius="0.05" color="#FF4455"></a-sphere>
      <a-sphere position="0.05 0.2 0.33" radius="0.05" color="#FFCC00"></a-sphere>
      <a-sphere position="0.25 0.2 0.33" radius="0.05" color="#00FFCC"></a-sphere>

      <!-- Chest vent lines -->
      <a-box position="0 -0.1 0.32" width="0.5" height="0.02" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0 -0.18 0.32" width="0.5" height="0.02" depth="0.01" color="#2C3E50"></a-box>
      <a-box position="0 -0.26 0.32" width="0.5" height="0.02" depth="0.01" color="#2C3E50"></a-box>

      <!-- Shoulders -->
      <a-sphere position="0.65 0.5 0" radius="0.18" color="#A8B8C8"></a-sphere>
      <a-sphere position="-0.65 0.5 0" radius="0.18" color="#A8B8C8"></a-sphere>

      <!-- Arms -->
      <a-cylinder position="0.75 0 0" radius="0.11" height="1" color="#A8B8C8"></a-cylinder>
      <a-cylinder position="-0.75 0 0" radius="0.11" height="1" color="#A8B8C8"></a-cylinder>

      <!-- Hands (boxy) -->
      <a-box position="0.75 -0.6 0" width="0.22" height="0.22" depth="0.22" color="#7A9AAF"></a-box>
      <a-box position="-0.75 -0.6 0" width="0.22" height="0.22" depth="0.22" color="#7A9AAF"></a-box>

      <!-- Hips -->
      <a-box position="0 -0.7 0" width="1.0" height="0.2" depth="0.55" color="#6B8799"></a-box>

      <!-- Legs -->
      <a-cylinder position="0.28 -1.2 0" radius="0.16" height="1" color="#8A9BAA"></a-cylinder>
      <a-cylinder position="-0.28 -1.2 0" radius="0.16" height="1" color="#8A9BAA"></a-cylinder>

      <!-- Feet -->
      <a-box position="0.28 -1.72 0.08" width="0.32" height="0.1" depth="0.45" color="#6B8799"></a-box>
      <a-box position="-0.28 -1.72 0.08" width="0.32" height="0.1" depth="0.45" color="#6B8799"></a-box>

      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="directional" position="2 4 2" intensity="0.9"></a-light>
    </a-scene>
  </body>
</html>
    </a-scene>
  </body>
</html>
    </a-scene>
    </body>
</html>
